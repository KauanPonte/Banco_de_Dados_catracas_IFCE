<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Catraca IFCE</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">

  <div class="topo">

    <img src="assets/ifce_logo.png" class="logo">

    <h1 class="titulo-sistema">
      Controle de Acesso do IFCE
    </h1>

  </div>

  <nav class="menu">

    <button onclick="mostrarAba('todos')">
      Novos cadastros
    </button>

    <button onclick="mostrarAba('cartoes'); carregarCartoes()">
      Todos os alunos
    </button>

    <button onclick="mostrarAba('bloqueados'); carregarCartoesBloqueados()">
      Cartões bloqueados
    </button>

    <button onclick="mostrarAba('historico'); iniciarHistorico()">
      Controle de acessos
    </button>

  </nav>

</header>


  <!-- CONTEÚDO -->

  <main class="container">

    <!-- TODOS -->
    <section id="todos" class="aba">

  <!-- CARD CADASTRO -->

  <div class="card">

    <h1>Novo Cartão</h1>

  <div style="display: flex; gap: 8px">
    <input type="text" id="uid" placeholder="UID">

    <button class="btn-cadastrar" onclick="aguardarCartao()" style="width:160px ;">
      Ler cartão
    </button>
  </div>

    <input type="text"
           id="nome"
           placeholder="Nome">

    <input type="text"
           id="matricula"
           placeholder="Matrícula">

    <select id="status">

      <option value="aprovado">
        Aprovado
      </option>

      <option value="bloqueado">
        Bloqueado
      </option>

    </select>


      
    <button 
    class="btn-cadastrar"
    onclick="cadastrarCartao()">
      Cadastrar
    </button> 
        

  </div>


</section>


    <!-- TODOS OS ALUNOS -->
    <section id="cartoes" class="aba hidden">

      <div class="card">

        <h1>Todos os alunos</h1>

        <div class="filtros">
          <input
            type="text"
            id="filtroAlunosTexto"
            placeholder="Buscar por nome ou matrícula"
            oninput="filtrarAlunos()">
          <select id="filtroAlunosStatus" onchange="filtrarAlunos()">
            <option value="">Todos</option>
            <option value="aprovado">Aprovado</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th></th>
              <th>UID</th>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <button
            class="btn-excluir"
            onclick="excluirSelecionados()">
            Excluir selecionados
          </button>
          <tbody id="tabelaTodos"></tbody>
        </table>

      </div>

    </section>


    <!-- TODOS OS ALUNOS -->
    <section id="cartoes" class="aba hidden">

      <div class="card">

        <h1>Todos os alunos</h1>

        <div class="filtros">
          <input
            type="text"
            id="filtroAlunosTexto"
            placeholder="Buscar por nome ou matrícula"
            oninput="filtrarAlunos()">

          <select id="filtroAlunosStatus" onchange="filtrarAlunos()">
            <option value="">Todos</option>
            <option value="aprovado">Aprovado</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th></th>
              <th>UID</th>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <button class="btn-excluir" onclick="excluirSelecionados()">
            Excluir selecionados
          </button>
          <tbody id="tabelaTodos"></tbody>
        </table>

      </div>

    </section>


    <!-- BLOQUEADOS -->
    <section id="bloqueados" class="aba hidden">

      <h1>Cartões bloqueados</h1>

      <table>

        <thead>
          <tr>
            <th>UID</th>
            <th>Nome</th>
            <th>Matrícula</th>
            <th>Status</th>
            </tr>
        </thead>

        <tbody id="tabelaBloqueados"></tbody>

      </table>

    </section>


    <!-- HISTÓRICO -->
    <section id="historico" class="aba hidden">

      <div class="card">

        <h1>Controle de acessos</h1>

        <div id="painelAcesso" class="painel-acesso hidden">

          <div class="painel-foto">
            <img id="painelFoto" src="" alt="">
          </div>

          <div class="painel-info">
            <h2 id="painelNome">-</h2>
            <p id="painelMatricula">Matrícula: -</p>
            <p id="painelUID">UID: -</p>
            <span id="painelResultado" class="painel-badge">-</span>
            <p id="painelHora">-</p>
          </div>

        </div>

        <div class="filtros">
          <input
            type="text"
            id="filtroTexto"
            placeholder="Buscar por nome ou matrícula"
            oninput="filtrarHistorico()">

          <select id="filtroResultado" onchange="filtrarHistorico()">
            <option value="">Todos</option>
            <option value="entrada">Entrada</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>UID</th>
              <th>Resultado</th>
              <th>Data / Hora</th>
            </tr>
          </thead>
          <tbody id="tabelaHistorico"></tbody>
        </table>

      </div>

    </section>

  </main>

  <!-- MODAL DE EDIÇÃO -->
  <div id="modalEdicao" class="modal-overlay hidden">
    <div class="modal-box">

      <h2>Editar cadastro</h2>

      <input type="hidden" id="editUidOriginal">

      <div style="display:flex; gap:8px">
        <input type="text" id="editUid" placeholder="UID">
        <button class="btn-cadastrar" style="width:160px" onclick="aguardarCartaoEdicao()">
          Ler cartão
        </button>
      </div>

      <input type="text" id="editNome" placeholder="Nome">
      <input type="text" id="editMatricula" placeholder="Matrícula">

      <select id="editStatus">
        <option value="aprovado">Aprovado</option>
        <option value="bloqueado">Bloqueado</option>
      </select>

      <div style="display:flex; gap:8px; margin-top:16px">
        <button class="btn-cadastrar" onclick="salvarEdicao()">Salvar</button>
        <button class="btn-remover" onclick="fecharModal()">Cancelar</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
