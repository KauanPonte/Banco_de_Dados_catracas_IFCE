<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Catraca IFCE</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">

    <div class="logo-area">

      <img
       src="assets/ifce_logo.png"
        class="logo"
      >
         <h2>Controle de Acesso do IFCE</h2>
    </div>

    <nav class="menu">

    <button onclick="mostrarAba('todos')">
      Novos cadastros
    </button>

    <button onclick="mostrarAba('cartoes'); carregarCartoes()">
      Todos os alunos
      </button>

    <button onclick="mostrarAba('bloqueados'); carregarCartoesBloqueados()">
      Cartões bloqueados
    </button>

    <button onclick="mostrarAba('historico'); iniciarHistorico()">
      Histórico
    </button>

  </nav>

  </header>


  <!-- CONTEÚDO -->

  <main class="container">

    <!-- TODOS -->
    <section id="todos" class="aba">

  <!-- CARD CADASTRO -->

  <div class="card">

    <h1>Novo Cartão</h1>

  <div style="display: flex; gap: 8px">
    <input type="text" id="uid" placeholder="UID">

    <button class="btn-cadastrar" onclick="aguardarCartao()" style="width:160px ;">
      Ler cartão
    </button>
  </div>

    <input type="text"
           id="nome"
           placeholder="Nome">

    <input type="text"
           id="matricula"
           placeholder="Matrícula">

    <select id="status">

      <option value="aprovado">
        Aprovado
      </option>

      <option value="bloqueado">
        Bloqueado
      </option>

    </select>


      
    <button 
    class="btn-cadastrar"
    onclick="cadastrarCartao()">
      Cadastrar
    </button> 
        

  </div>


</section>


    <!-- TODOS OS ALUNOS -->
    <section id="cartoes" class="aba hidden">

      <div class="card">

        <h1>Todos os alunos</h1>

        <table>
          <thead>
            <tr>
              <th></th>
              <th>UID</th>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <button
            class="btn-excluir"
            onclick="excluirSelecionados()">
            Excluir selecionados
          </button>
          <tbody id="tabelaTodos"></tbody>
        </table>

      </div>

</section>


    <!-- CARTÕES -->
    <section id="cartoes" class="aba hidden">

      <h1>Cartões cadastrados</h1>

      <table>

        <thead>
          <tr>
            <th>UID</th>
            <th>Nome</th>
            <th>Matrícula</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="tabelaCartoes"></tbody>

      </table>

    </section>


    <!-- BLOQUEADOS -->
    <section id="bloqueados" class="aba hidden">

      <h1>Cartões bloqueados</h1>

      <table>

        <thead>
          <tr>
            <th>UID</th>
            <th>Nome</th>
            <th>Matrícula</th>
          </tr>
        </thead>

        <tbody id="tabelaBloqueados"></tbody>

      </table>

    </section>


    <!-- HISTÓRICO -->
    <section id="historico" class="aba hidden">

      <div class="card">

        <h1>Histórico de acessos</h1>

        <div class="filtros">
          <input
            type="text"
            id="filtroTexto"
            placeholder="Buscar por nome ou matrícula"
            oninput="filtrarHistorico()">

          <select id="filtroResultado" onchange="filtrarHistorico()">
            <option value="">Todos</option>
            <option value="entrada">Entrada</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>UID</th>
              <th>Resultado</th>
              <th>Data / Hora</th>
            </tr>
          </thead>
          <tbody id="tabelaHistorico"></tbody>
        </table>

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
